name: Morning Watchlist Maintenance

# Runs at 8:30 AM IST (3:00 AM UTC) every weekday before market hours
on:
  schedule:
    - cron: '0 3 * * 1-5'
  workflow_dispatch: {}   # allow manual trigger from Actions tab

permissions:
  contents: write          # required to commit positions.csv state back

concurrency:
  group: morning-watchlist-maintenance
  cancel-in-progress: false

jobs:
  maintenance:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run watchlist maintenance
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python core/morning_watchlist_maintenance.py

      - name: Commit state changes
        run: |
          git config user.name  "Swing Sentinel Bot"
          git config user.email "bot@swingsentinel.local"
          git add data/positions.csv
          if git diff --staged --quiet; then
            echo "No state change — nothing to commit."
          else
            git commit -m "Auto: morning watchlist level adjustments [skip ci]"
            git push
          fi

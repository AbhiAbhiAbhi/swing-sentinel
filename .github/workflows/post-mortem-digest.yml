name: SL Post-Mortem Weekly Digest

# Runs at 4:00 PM IST (10:30 UTC) on Fridays — sends a Telegram summary of
# the week's stop-losses and the overall failure-class pattern.
# See core/core_post_mortem.py build_weekly_digest_text().
on:
  schedule:
    - cron: '30 10 * * 5'
  workflow_dispatch: {}   # allow manual trigger from Actions tab

concurrency:
  group: post-mortem-digest
  cancel-in-progress: false

jobs:
  digest:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Send weekly digest
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python core/core_post_mortem.py --digest --send

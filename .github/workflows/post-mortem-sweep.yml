name: SL Post-Mortem Sweep

# Runs at 3:45 PM IST (10:15 UTC) on weekdays, after the last poll window —
# catches any SL_LOSS row the live poll missed and evaluates due TIGHT_SL
# re-checks (5 trading days after the stop-out). See core/core_post_mortem.py.
on:
  schedule:
    - cron: '15 10 * * 1-5'
  workflow_dispatch: {}   # allow manual trigger from Actions tab

permissions:
  contents: write          # required to commit positions.csv + sidecar state back

concurrency:
  group: post-mortem-sweep
  cancel-in-progress: false

jobs:
  sweep:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run post-mortem sweep
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
          ANTHROPIC_API_KEY:  ${{ secrets.ANTHROPIC_API_KEY }}
        run: python core/core_post_mortem.py --sweep --with-llm

      - name: Commit state changes
        run: |
          git config user.name  "Swing Sentinel Bot"
          git config user.email "bot@swingsentinel.local"
          git add data/positions.csv data/post_mortems/
          if git diff --staged --quiet; then
            echo "No state change — nothing to commit."
          else
            git commit -m "Auto: post-mortem sweep [skip ci]"
            git push
          fi

    function CodeBlock({ code, color }) {
      const tabs = [];
      if (code.chartink) tabs.push({ key: "chartink", label: "Chartink" });
      if (code.formula) tabs.push({ key: "formula", label: "Formula" });

      const [activeTab, setActiveTab] = useState(tabs[0].key);
      const [copied, setCopied] = useState(false);

      const handleCopy = (e) => {
        e.stopPropagation();
        navigator.clipboard.writeText(code[activeTab]);
        setCopied(true);
        setTimeout(() => setCopied(false), 1500);
      };

      const renderCode = (text) => {
        return text.split("\n").map((line, i) => {
          const isComment = line.trim().startsWith("//") || line.trim().startsWith("#");
          return (
            <div key={i} style={{ color: isComment ? "#475569" : "#CBD5E1", fontStyle: isComment ? "italic" : "normal" }}>
              {line || " "}
            </div>
          );
        });
      };

      return (
        <div onClick={(e) => e.stopPropagation()} style={{
          marginTop: "12px", background: "#08080F", border: "1px solid #1E2035",
          borderRadius: "6px", overflow: "hidden",
        }}>
          <div style={{
            display: "flex", justifyContent: "space-between", alignItems: "center",
            borderBottom: "1px solid #1E2035", background: "#0D0D18", padding: "0 8px",
          }}>
            <div style={{ display: "flex" }}>
              {tabs.map((tab) => (
                <button key={tab.key}
                  onClick={(e) => { e.stopPropagation(); setActiveTab(tab.key); }}
                  style={{
                    background: "transparent", border: "none",
                    color: activeTab === tab.key ? color : "#64748B",
                    padding: "8px 12px", fontSize: "11px", letterSpacing: "1px",
                    cursor: "pointer",
                    borderBottom: activeTab === tab.key ? `2px solid ${color}` : "2px solid transparent",
                    fontFamily: "inherit", transition: "all 0.2s",
                  }}
                >
                  {tab.label.toUpperCase()}
                </button>
              ))}
            </div>
            <button onClick={handleCopy} style={{
              background: copied ? color + "33" : "transparent",
              border: `1px solid ${copied ? color + "66" : "#2D2D45"}`,
              color: copied ? color : "#94A3B8",
              padding: "4px 10px", fontSize: "10px", letterSpacing: "1px",
              cursor: "pointer", borderRadius: "4px", fontFamily: "inherit",
            }}>
              {copied ? "✓ COPIED" : "COPY"}
            </button>
          </div>
          <pre style={{
            margin: 0, padding: "14px 16px", fontSize: "12px", lineHeight: "1.6",
            fontFamily: "'DM Mono', 'Courier New', monospace",
            overflowX: "auto", whiteSpace: "pre",
          }}>
            {renderCode(code[activeTab])}
          </pre>
        </div>
      );
    }

    // ---------- Main component ----------
    function SwingTradingChecklist() {
      const [checked, setChecked] = useState({});
      const [expanded, setExpanded] = useState({});
      const [activeSection, setActiveSection] = useState("watchlist");

      const toggle = (id) => setChecked((prev) => ({ ...prev, [id]: !prev[id] }));
      const toggleExpand = (id, e) => { e.stopPropagation(); setExpanded((prev) => ({ ...prev, [id]: !prev[id] })); };

      const totalItems = sections.reduce((acc, s) => acc + s.items.length, 0);
      const checkedCount = Object.values(checked).filter(Boolean).length;
      const progress = Math.round((checkedCount / totalItems) * 100);
      const sectionProgress = (section) => Math.round(section.items.filter((i) => checked[i.id]).length / section.items.length * 100);
      const resetAll = () => { setChecked({}); setExpanded({}); };
      const active = sections.find((s) => s.id === activeSection);

      return (
        <div style={{
          minHeight: "100vh", background: "#0A0A0F", color: "#E2E8F0",
          fontFamily: "'DM Mono', 'Courier New', monospace", display: "flex", flexDirection: "column",
        }}>
          <BackLink />
          {/* Header */}
          <div style={{
            background: "linear-gradient(135deg, #0F0F1A 0%, #1A1A2E 100%)",
            borderBottom: "1px solid #1E2035", padding: "24px 32px",
            display: "flex", alignItems: "center", justifyContent: "space-between",
            flexWrap: "wrap", gap: "16px",
          }}>
            <div>
              <div style={{ fontSize: "11px", letterSpacing: "3px", color: "#6366F1", marginBottom: "6px", textTransform: "uppercase" }}>
                Indian Markets • NSE / BSE
              </div>
              <h1 style={{ margin: 0, fontSize: "22px", fontWeight: "700", color: "#F1F5F9", letterSpacing: "-0.5px" }}>
                Swing Trading Checklist + Formulas
              </h1>
            </div>
            <div style={{ display: "flex", alignItems: "center", gap: "20px" }}>
              <div style={{ position: "relative", width: "64px", height: "64px" }}>
                <svg viewBox="0 0 64 64" style={{ transform: "rotate(-90deg)", width: "64px", height: "64px" }}>
                  <circle cx="32" cy="32" r="26" fill="none" stroke="#1E2035" strokeWidth="5" />
                  <circle cx="32" cy="32" r="26" fill="none" stroke="#6366F1" strokeWidth="5"
                    strokeDasharray={`${2 * Math.PI * 26}`}
                    strokeDashoffset={`${2 * Math.PI * 26 * (1 - progress / 100)}`}
                    strokeLinecap="round"
                    style={{ transition: "stroke-dashoffset 0.4s ease" }}
                  />
                </svg>
                <div style={{
                  position: "absolute", inset: 0, display: "flex",
                  alignItems: "center", justifyContent: "center",
                  fontSize: "12px", fontWeight: "700", color: "#A5B4FC",
                }}>
                  {progress}%
                </div>
              </div>
              <div style={{ textAlign: "right" }}>
                <div style={{ fontSize: "22px", fontWeight: "700", color: "#F1F5F9" }}>
                  {checkedCount}<span style={{ color: "#475569", fontSize: "16px" }}>/{totalItems}</span>
                </div>
                <div style={{ fontSize: "11px", color: "#64748B", letterSpacing: "1px" }}>COMPLETED</div>
              </div>
              <button onClick={resetAll} style={{
                background: "transparent", border: "1px solid #2D2D45", color: "#94A3B8",
                padding: "8px 14px", borderRadius: "6px", cursor: "pointer",
                fontSize: "11px", letterSpacing: "1px", fontFamily: "inherit",
              }}>
                RESET
              </button>
            </div>
          </div>

          <div style={{ display: "flex", flex: 1, overflow: "hidden" }}>
            {/* Sidebar */}
            <div style={{
              width: "230px", minWidth: "230px", background: "#0D0D18",
              borderRight: "1px solid #1E2035", padding: "16px 0", overflowY: "auto",
            }}>
              {sections.map((section, idx) => {
                const pct = sectionProgress(section);
                const isActive = activeSection === section.id;
                const hasCode = section.items.some((i) => i.code);
                return (
                  <button key={section.id} onClick={() => setActiveSection(section.id)} style={{
                    width: "100%", background: isActive ? "#151525" : "transparent",
                    border: "none", borderLeft: isActive ? `3px solid ${section.color}` : "3px solid transparent",
                    cursor: "pointer", padding: "12px 16px", textAlign: "left",
                    display: "flex", alignItems: "center", gap: "10px", fontFamily: "inherit",
                  }}>
                    <span style={{ fontSize: "10px", color: isActive ? section.color : "#334155", fontWeight: "600", minWidth: "14px" }}>
                      {String(idx + 1).padStart(2, "0")}
                    </span>
                    <span style={{ fontSize: "16px" }}>{section.icon}</span>
                    <div style={{ flex: 1, minWidth: 0 }}>
                      <div style={{
                        fontSize: "12px", fontWeight: isActive ? "600" : "400",
                        color: isActive ? "#F1F5F9" : "#64748B",
                        whiteSpace: "nowrap", overflow: "hidden", textOverflow: "ellipsis",
                        display: "flex", alignItems: "center", gap: "6px",
                      }}>
                        {section.label}
                        {hasCode && <span style={{ fontSize: "9px", color: section.color }}>{"</>"}</span>}
                      </div>
                      <div style={{ marginTop: "4px", height: "3px", background: "#1E2035", borderRadius: "2px", overflow: "hidden" }}>
                        <div style={{
                          height: "100%", width: `${pct}%`, background: section.color,
                          borderRadius: "2px", transition: "width 0.3s ease",
                        }} />
                      </div>
                    </div>
                    <span style={{ fontSize: "10px", color: "#475569", minWidth: "24px", textAlign: "right" }}>
                      {pct}%
                    </span>
                  </button>
                );
              })}
            </div>

            {/* Main content */}
            <div style={{ flex: 1, overflowY: "auto", padding: "28px 32px" }}>
              {active && (
                <div>
                  <div style={{
                    display: "flex", alignItems: "flex-start", justifyContent: "space-between",
                    marginBottom: "24px", flexWrap: "wrap", gap: "8px",
                  }}>
                    <div>
                      <div style={{ display: "flex", alignItems: "center", gap: "10px", marginBottom: "6px" }}>
                        <span style={{ fontSize: "24px" }}>{active.icon}</span>
                        <h2 style={{ margin: 0, fontSize: "20px", fontWeight: "700", color: "#F1F5F9" }}>{active.label}</h2>
                      </div>
                      <div style={{
                        display: "inline-block", background: "#151525",
                        border: `1px solid ${active.color}33`, color: active.color,
                        fontSize: "11px", letterSpacing: "2px", padding: "3px 10px", borderRadius: "4px",
                      }}>
                        {active.time}
                      </div>
                    </div>
                    <div style={{ fontSize: "13px", color: "#475569" }}>
                      {active.items.filter((i) => checked[i.id]).length} / {active.items.length} done
                    </div>
                  </div>

                  <div style={{ display: "flex", flexDirection: "column", gap: "10px" }}>
                    {active.items.map((item, idx) => {
                      const isDone = !!checked[item.id];
                      const isExpanded = !!expanded[item.id];
                      const hasCode = !!item.code;
                      return (
                        <div key={item.id} style={{
                          background: isDone ? "#0F1F18" : "#111120",
                          border: `1px solid ${isDone ? active.color + "44" : "#1E2035"}`,
                          borderRadius: "8px", transition: "all 0.2s",
                        }}>
                          <div onClick={() => toggle(item.id)} style={{
                            display: "flex", alignItems: "center", gap: "14px",
                            padding: "14px 18px", cursor: "pointer", userSelect: "none",
                          }}>
                            <div style={{
                              width: "20px", height: "20px", minWidth: "20px",
                              border: `2px solid ${isDone ? active.color : "#2D2D55"}`,
                              borderRadius: "4px", background: isDone ? active.color : "transparent",
                              display: "flex", alignItems: "center", justifyContent: "center", fontSize: "12px",
                            }}>
                              {isDone && <span style={{ color: "#000", fontWeight: "700" }}>✓</span>}
                            </div>
                            <span style={{ fontSize: "11px", color: isDone ? active.color + "88" : "#2D2D55", minWidth: "18px", fontWeight: "600" }}>
                              {String(idx + 1).padStart(2, "0")}
                            </span>
                            <span style={{
                              fontSize: "13px", color: isDone ? "#64748B" : "#CBD5E1",
                              textDecoration: isDone ? "line-through" : "none", flex: 1, lineHeight: "1.5",
                            }}>
                              {item.text}
                            </span>
                            <div style={{ display: "flex", gap: "6px", flexShrink: 0 }}>
                              {hasCode && (
                                <button onClick={(e) => toggleExpand(item.id, e)} style={{
                                  background: isExpanded ? active.color + "22" : "transparent",
                                  border: `1px solid ${isExpanded ? active.color + "66" : "#2D2D45"}`,
                                  color: isExpanded ? active.color : "#94A3B8",
                                  padding: "4px 10px", fontSize: "10px", letterSpacing: "1px",
                                  cursor: "pointer", borderRadius: "4px", fontFamily: "inherit",
                                  whiteSpace: "nowrap", transition: "all 0.2s",
                                }}>
                                  {isExpanded ? "▼ HIDE" : "</> CODE"}
                                </button>
                              )}
                            </div>
                          </div>
                          {hasCode && isExpanded && (
                            <div style={{ padding: "0 18px 16px 18px" }}>
                              <CodeBlock code={item.code} color={active.color} />
                            </div>
                          )}
                        </div>
                      );
                    })}
                  </div>

                  {/* Section nav */}
                  <div style={{
                    display: "flex", justifyContent: "space-between", marginTop: "32px",
                    paddingTop: "20px", borderTop: "1px solid #1E2035",
                  }}>
                    {(() => {
                      const idx = sections.findIndex((s) => s.id === activeSection);
                      const prev = sections[idx - 1];
                      const next = sections[idx + 1];
                      return (
                        <>
                          {prev ? (
                            <button onClick={() => setActiveSection(prev.id)} style={{
                              background: "transparent", border: "1px solid #2D2D45",
                              color: "#94A3B8", padding: "8px 16px", borderRadius: "6px",
                              cursor: "pointer", fontSize: "12px", letterSpacing: "1px", fontFamily: "inherit",
                            }}>
                              ← {prev.label}
                            </button>
                          ) : <div />}
                          {next && (
                            <button onClick={() => setActiveSection(next.id)} style={{
                              background: active.color + "22", border: `1px solid ${active.color}55`,
                              color: active.color, padding: "8px 16px", borderRadius: "6px",
                              cursor: "pointer", fontSize: "12px", letterSpacing: "1px", fontFamily: "inherit",
                            }}>
                              {next.label} →
                            </button>
                          )}
                        </>
                      );
                    })()}
                  </div>
                </div>
              )}
            </div>
          </div>

          {/* Footer */}
          <div style={{
            borderTop: "1px solid #1E2035", padding: "10px 32px",
            display: "flex", justifyContent: "space-between", alignItems: "center",
            background: "#0D0D18", fontSize: "11px", color: "#334155", letterSpacing: "1px",
          }}>
            <span>CHARTINK • RISK MATH</span>
            <span>CLICK {"</>"} CODE ON ANY ITEM</span>
          </div>
        </div>
      );
    }

    document.getElementById("loading").remove();
    ReactDOM.createRoot(document.getElementById("root")).render(<SwingTradingChecklist />);
  </script>
</body>
</html>

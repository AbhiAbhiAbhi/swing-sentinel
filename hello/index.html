<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Say Hello</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      font-family: 'Segoe UI', system-ui, sans-serif;
    }

    .card {
      background: rgba(255, 255, 255, 0.15);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid rgba(255, 255, 255, 0.25);
      border-radius: 24px;
      padding: 48px 56px;
      text-align: center;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
      max-width: 480px;
      width: 90%;
    }

    .emoji {
      font-size: 64px;
      margin-bottom: 20px;
      display: block;
      animation: wave 1.8s ease-in-out infinite;
      transform-origin: 70% 70%;
    }

    @keyframes wave {
      0%, 100% { transform: rotate(0deg); }
      20%       { transform: rotate(-15deg); }
      40%       { transform: rotate(12deg); }
      60%       { transform: rotate(-10deg); }
      80%       { transform: rotate(8deg); }
    }

    h1 {
      font-size: 2.4rem;
      font-weight: 700;
      color: #fff;
      margin-bottom: 8px;
      letter-spacing: -0.5px;
    }

    p {
      color: rgba(255, 255, 255, 0.75);
      font-size: 1rem;
      margin-bottom: 32px;
    }

    input {
      width: 100%;
      padding: 12px 18px;
      border-radius: 12px;
      border: 1px solid rgba(255, 255, 255, 0.3);
      background: rgba(255, 255, 255, 0.2);
      color: #fff;
      font-size: 1rem;
      outline: none;
      margin-bottom: 12px;
      transition: border-color 0.2s, background 0.2s;
    }

    input::placeholder {
      color: rgba(255, 255, 255, 0.55);
    }

    input:focus {
      border-color: rgba(255, 255, 255, 0.7);
      background: rgba(255, 255, 255, 0.28);
    }

    button {
      width: 100%;
      padding: 13px;
      border-radius: 12px;
      border: none;
      background: #fff;
      color: #764ba2;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.15s, box-shadow 0.15s;
    }

    button:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(0, 0, 0, 0.2);
    }

    button:active {
      transform: translateY(0);
    }

    .greeting {
      margin-top: 24px;
      font-size: 1.3rem;
      font-weight: 600;
      color: #fff;
      min-height: 32px;
      opacity: 0;
      transform: translateY(8px);
      transition: opacity 0.3s, transform 0.3s;
    }

    .greeting.visible {
      opacity: 1;
      transform: translateY(0);
    }
  </style>
</head>
<body>
  <div class="card">
    <span class="emoji">👋</span>
    <h1>Say Hello</h1>
    <p>Enter your name and get a warm greeting!</p>
    <input id="nameInput" type="text" placeholder="Your name…" maxlength="40" />
    <button onclick="sayHello()">Say Hello!</button>
    <div class="greeting" id="greeting"></div>
  </div>

  <script>
    const input = document.getElementById('nameInput');
    const greeting = document.getElementById('greeting');

    input.addEventListener('keydown', e => {
      if (e.key === 'Enter') sayHello();
    });

    function sayHello() {
      const name = input.value.trim();
      const message = name ? `Hello, ${name}! 🎉` : 'Hello, World! 🌍';
      greeting.textContent = message;
      greeting.classList.remove('visible');
      requestAnimationFrame(() => requestAnimationFrame(() => greeting.classList.add('visible')));
    }
  </script>
</body>
</html>
